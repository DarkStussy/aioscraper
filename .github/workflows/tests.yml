name: Tests

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/tests.yml"
      - "aioscraper/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".pytest.toml"
      - ".ruff.toml"
      - "pyrightconfig.json"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/tests.yml"
      - "aioscraper/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".pytest.toml"
      - ".ruff.toml"
      - "pyrightconfig.json"

jobs:
  tests:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    defaults:
      run:
        shell: bash

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --python ${{ matrix.python-version }} --extra aiohttp --extra httpx

      - name: Lint code
        run: |
          uv run --python ${{ matrix.python-version }} ruff check --output-format=github aioscraper examples tests
          uv run --python ${{ matrix.python-version }} basedpyright aioscraper tests
          uv run --python ${{ matrix.python-version }} ruff format --check --diff aioscraper tests

      - name: Run tests
        run: uv run --python ${{ matrix.python-version }} pytest -v
